<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seamless Minimalist Scroll</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
    }

    .ticker-viewport {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }

    .ticker-move {
      display: inline-flex;
      white-space: nowrap;
      width: max-content;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
      will-change: transform;
    }

    .ticker-content {
      display: inline-flex;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .ticker-item {
      display: inline-block;
      font-size: 80px;
      font-weight: 700;
      color: #000000;
      padding-right: 300px;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div class="ticker-viewport">
    <div class="ticker-move" id="ticker-mover">
      <div class="ticker-content" id="content-a">
        <span class="ticker-item">Loading messages...</span>
      </div>
      <div class="ticker-content" id="content-b"></div>
    </div>
  </div>

  <script>
    const SHEET_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVV3dYqhWq7-sR2FLBP5WYDDKBu8gIGmpFP-xuPQzdK6dWVMXmIeCrt3QbGvA0NJ-9SJVPnO_4P9Tf/pub?output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && nextChar === '\n') {
            i++;
          }
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      rows.push(row);

      return rows;
    }

    function parseSingleColumnCSV(text) {
      const rows = parseCSV(text);

      return rows
        .slice(1)
        .map(row => (row[0] || "").trim())
        .filter(value => value !== "");
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function buildTickerHTML(messages) {
      return messages
        .map(msg => `<span class="ticker-item">${escapeHtml(msg)}</span>`)
        .join("");
    }

    function restartAnimation(pixelsPerSecond = 120) {
      const mover = document.getElementById("ticker-mover");
      const contentA = document.getElementById("content-a");
      const width = contentA.offsetWidth;
      const duration = width / pixelsPerSecond;

      const oldStyle = document.getElementById("ticker-keyframes");
      if (oldStyle) oldStyle.remove();

      const style = document.createElement("style");
      style.id = "ticker-keyframes";
      style.textContent = `
        @keyframes move-left {
          from { transform: translate3d(0, 0, 0); }
          to { transform: translate3d(-${width}px, 0, 0); }
        }
      `;
      document.head.appendChild(style);

      mover.style.animation = "none";
      void mover.offsetWidth;
      mover.style.animation = `move-left ${duration}s linear infinite`;

      console.log("Ticker width:", width, "Duration:", duration, "seconds");
    }

    async function fetchAndBuild() {
      try {
        const response = await fetch(`${SHEET_URL}&cachebust=${Date.now()}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const csvText = await response.text();
        const messages = parseSingleColumnCSV(csvText);

        console.log("Messages loaded:", messages.length, messages);

        const contentA = document.getElementById("content-a");
        const contentB = document.getElementById("content-b");

        if (messages.length === 0) {
          const fallback = `<span class="ticker-item">No messages available</span>`;
          contentA.innerHTML = fallback;
          contentB.innerHTML = fallback;
        } else {
          const itemsHtml = buildTickerHTML(messages);
          contentA.innerHTML = itemsHtml;
          contentB.innerHTML = itemsHtml;
        }

        restartAnimation(120);
      } catch (error) {
        console.error("Fetch error:", error);
        const errorHtml = `<span class="ticker-item">Error loading feed.</span>`;
        document.getElementById("content-a").innerHTML = errorHtml;
        document.getElementById("content-b").innerHTML = errorHtml;
        restartAnimation(120);
      }
    }

    fetchAndBuild();

    // Refresh every 10 minutes instead of every 60 seconds
    setInterval(fetchAndBuild, 600000);

    window.addEventListener("resize", () => {
      restartAnimation(120);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seamless Minimalist Scroll</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
    }

    .ticker-viewport {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-move {
      display: inline-flex;
      white-space: nowrap;
      will-change: transform;
    }

    .ticker-content {
      display: inline-flex;
      white-space: nowrap;
    }

    .ticker-item {
      display: inline-block;
      font-size: 80px;
      font-weight: 700;
      color: #000000;
      padding-right: 300px;
      flex: 0 0 auto;
    }

    @keyframes move-left {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <div class="ticker-viewport">
    <div class="ticker-move" id="ticker-mover">
      <div class="ticker-content" id="content-a">
        <span class="ticker-item">Loading messages...</span>
      </div>
      <div class="ticker-content" id="content-b"></div>
    </div>
  </div>

  <script>
    const SHEET_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVV3dYqhWq7-sR2FLBP5WYDDKBu8gIGmpFP-xuPQzdK6dWVMXmIeCrt3QbGvA0NJ-9SJVPnO_4P9Tf/pub?output=csv";

    function parseSingleColumnCSV(text) {
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
      return lines
        .slice(1)
        .map(line => {
          let value = line.trim();
          if (value.startsWith('"') && value.endsWith('"')) {
            value = value.slice(1, -1).replace(/""/g, '"');
          }
          return value.trim();
        })
        .filter(Boolean);
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function buildTickerHTML(messages) {
      return messages
        .map(msg => `<span class="ticker-item">${escapeHtml(msg)}</span>`)
        .join("");
    }

    function restartAnimation(pixelsPerSecond = 120) {
      const mover = document.getElementById("ticker-mover");
      const content = document.getElementById("content-a");

      const width = content.offsetWidth;
      const duration = width / pixelsPerSecond;

      mover.style.animation = "none";
      void mover.offsetWidth;
      mover.style.animation = `move-left ${duration}s linear infinite`;
    }

    async function fetchAndBuild() {
      try {
        const response = await fetch(`${SHEET_URL}&cachebust=${Date.now()}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const csvText = await response.text();
        const messages = parseSingleColumnCSV(csvText);

        const contentA = document.getElementById("content-a");
        const contentB = document.getElementById("content-b");

        if (messages.length === 0) {
          contentA.innerHTML = `<span class="ticker-item">No messages available</span>`;
          contentB.innerHTML = contentA.innerHTML;
        } else {
          const itemsHtml = buildTickerHTML(messages);
          contentA.innerHTML = itemsHtml;
          contentB.innerHTML = itemsHtml;
        }

        restartAnimation(120);
      } catch (error) {
        console.error("Fetch error:", error);
        const errorHtml = `<span class="ticker-item">Error loading feed.</span>`;
        document.getElementById("content-a").innerHTML = errorHtml;
        document.getElementById("content-b").innerHTML = errorHtml;
        restartAnimation(120);
      }
    }

    fetchAndBuild();
    setInterval(fetchAndBuild, 60000);
  </script>
</body>
</html>
